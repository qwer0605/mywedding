<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리의 결혼 준비 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 첫 방문 설정 화면 -->
<div class="setup-overlay" id="setupOverlay">
  <div class="setup-logo">💍</div>
  <div class="setup-title">우리의 결혼 준비</div>
  <div class="setup-sub">
    결혼 날짜를 설정하고<br>
    준비 여정을 함께 시작해요
  </div>
  <button class="btn btn-primary" id="setupStartBtn" style="font-size:16px;padding:14px 32px;border-radius:12px">
    시작하기
  </button>
</div>

<!-- 내비게이션 -->
<nav class="navbar">
  <div class="logo" onclick="App.showTab('home')">💍 우리의 결혼</div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="home"     onclick="App.showTab('home')">홈</button>
    <button class="nav-tab"        data-tab="timeline"  onclick="App.showTab('timeline')">타임라인</button>
    <button class="nav-tab"        data-tab="vendor"    onclick="App.showTab('vendor')">업체</button>
    <button class="nav-tab"        data-tab="photos"    onclick="App.showTab('photos')">참고사진</button>
    <button class="nav-tab"        data-tab="budget"    onclick="App.showTab('budget')">예산</button>
  </div>
</nav>

<!-- 화면 영역 -->
<div id="homeScreen"     class="screen active"></div>
<div id="timelineScreen" class="screen"></div>
<div id="vendorScreen"   class="screen"></div>
<div id="photosScreen"   class="screen"></div>
<div id="budgetScreen"   class="screen"></div>

<!-- 공용 모달 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox"></div>
</div>

<script src="js/data.js"></script>
<script src="js/home.js"></script>
<script src="js/timeline.js"></script>
<script src="js/vendor.js"></script>
<script src="js/photos.js"></script>
<script src="js/budget.js"></script>
<script src="js/app.js"></script>
</body>
</html>
